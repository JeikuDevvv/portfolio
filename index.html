<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./assets/icon/jd.ico">
    <link rel="stylesheet" href="./fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="index.js"></script>
    <title>Jeiku Dev</title>
  </head>
  <body>
    <header>
      <nav id="navBar">
        <div class="line"></div>
        <a class="logoText">ジェイク・デヴ</a>
        <img class="logoImage" src="./assets/img/logo.png" alt="JeikuDev" />
      </nav>
    </header>
    <div class="MAIN">
      <div id="contentContainer">
        <div class="logoDiv">
          <img src="./assets/img/logoRed.png" alt="JeikuDev" />
          <a>ジェイク・デヴ</a>
        </div>
        <h1>JEIKU RORENSU</h1>
        <h3>Portfolio // Portfolio</h3>
        <div id="buttonContainer">
          <div class="facebook_boxButton" onclick="facebookButton()">
            <div class="btn button">
              <span><i class="fa-brands fa-facebook-f"></i> Facebook</span>
            </div>
          </div>
          <div class="twitter_boxButton" onclick="twitterButton()">
            <div class="btn button">
              <span><i class="fa-brands fa-twitter"></i> Twitter</span>
            </div>
          </div>
          <div class="linkedin_boxButton" onclick="linkedinButton()">
            <div class="btn button">
              <span><i class="fa-brands fa-linkedin-in"></i> LinkedIn</span>
            </div>
          </div>
          <div class="about_boxButton" onclick="aboutButton()">
            <div class="btn button">
              <span><i class="fa-solid fa-info"></i> About</span>
            </div>
          </div>
          </div>
        </div>
      </div>
      <div id="leftTextDesign">
        <div class="leftBodyText">ジェイク・デヴ</div>
        <div class="leftBodyBar"></div>
        <div class="leftBodyText">ジェイク・デヴ</div>
        <div class="leftBodyBarV3"></div>
        <div class="leftBodyBarV2"></div>
        <div class="leftBodyText">ジェイク・デヴ</div>
        <div class="leftBodyBar"></div>
        <div class="leftBodyText">ジェイク・デヴ</div>
      </div>
    </div>

    
  </body>
</html>
